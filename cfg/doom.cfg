alias gauntlet         "slot 1"
alias machinegun       "slot 2; wait 0; use QCMachinegun; wait 0; use QCMachinegunDM"
alias heavy_machinegun "use HeavyMachinegun; wait 0; use HeavyMachinegunDM"
alias shotgun          "slot 3; wait 0; use QCShotgun; wait 0; use QCShotgunDM"
alias super_shotgun    "use QCSuperShotgun; wait 0; use QCSuperShotgunDM"
alias nailgun          "slot 4; wait 0; use QCNailgun; wait 0; use QCNailgunDM"
alias super_nailgun    "use QCSuperNailgun; wait 0; use QCSuperNailgunDM"
alias tribolt          "slot 5"
alias rocket           "slot 6"
alias lightning        "slot 7"
alias railgun          "slot 8"
alias bfg              "slot 9"
alias ability          "slot 0"

alias best "slot 3; wait 0; use QCShotgun; wait 0; use QCShotgunDM; wait 0; slot 2; wait 0; use QCMachinegun; wait 0; use QCMachinegunDM; wait 0; slot 4; wait 0; use QCNailgun; wait 0; use QCNailgunDM; use QCSuperNailgun; wait 0; use QCSuperNailgunDM; wait 0; use HeavyMachinegun; wait 0; use HeavyMachinegunDM; wait 0; use QCSuperShotgun; wait 0; use QCSuperShotgunDM; wait 0; slot 7; wait 0; slot 5; wait 0; slot 6; wait 0; slot 0; wait 0; slot 9; wait 0; slot 8; wait 0;"

// alias best "shotgun; wait 0; machinegun; wait 0; nailgun; wait 0; super_nailgun; wait 0; heavy_machinegun; wait 0; super_shotgun; wait 0; lightning; wait 0; tribolt; wait 0; rocket; wait 0; ability; wait 0; bfg; wait 0; railgun; wait 0;"

alias shot "shotgun; wait 0; super_shotgun; wait 0; tribolt; wait 0; rocket; wait 0; bfg; wait 0; railgun; wait 0;"

alias beam "machinegun; wait 0; nailgun; wait 0; super_nailgun; wait 0; heavy_machinegun; wait 0; lightning; wait 0; ability; wait 0;"

alias quick_melee_then_shot "gauntlet; wait 6; +attack; wait 0; -attack; wait 0; beam; wait 0; shot;"
alias quick_melee_then_beam "gauntlet; wait 6; +attack; wait 0; -attack; wait 0; shot; wait 0; beam;"

alias shot_into_beam "bind MWheelDown beam_into_shot; shot;"
alias beam_into_shot "bind MWheelDown shot_into_beam; beam;"

bind Mouse3 "+user1"
bind MWheelUp "bind MWheelDown beam_into_shot; best;"
bind MWheelDown beam_into_shot

bind Q "+user1"
bind T shotgun
bind Y shotgun
bind F railgun
bind G nailgun
bind Z lightning
bind X rocket
bind C machinegun
bind V tribolt
bind B bfg

fov 120
switchonpickup 0
cl_noammoswitch false
