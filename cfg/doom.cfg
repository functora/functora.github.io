alias gauntlet   "slot 1"
alias machinegun "slot 2"
alias shotgun    "slot 3"
alias nailgun    "slot 4"
alias tribolt    "slot 5"
alias rocket     "slot 6"
alias lightning  "slot 7"
alias railgun    "slot 8"
alias bfg        "slot 9"
alias ability    "slot 0"

alias best "gauntlet; wait 0; machinegun; wait 0; nailgun; wait 0; shotgun; wait 0; lightning; wait 0; tribolt; wait 0; rocket; wait 0; ability; wait 0; bfg; wait 0; railgun;"
alias shot "gauntlet; wait 0; shotgun; wait 0; tribolt; wait 0; rocket; wait 0; bfg; wait 0; railgun;"
alias beam "machinegun; wait 0; nailgun; wait 0; lightning; wait 0; ability;"

alias fast_swap_mode "bind q beam_then_shot; best;"
alias beam_then_shot "bind q shot_then_beam; beam;"
alias shot_then_beam "bind q beam_then_shot; shot;"

bind R fast_swap_mode
bind Q shot_then_beam

alias slot1 "bind q best1; slot 1;"
alias best1 "bind q slot1; best;"

alias slot2 "bind q best2; slot 2;"
alias best2 "bind q slot2; best;"

alias slot3 "bind q best3; slot 3;"
alias best3 "bind q slot3; best;"

alias slot4 "bind q best4; slot 4;"
alias best4 "bind q slot4; best;"

alias slot5 "bind q best5; slot 5;"
alias best5 "bind q slot5; best;"

alias slot6 "bind q best6; slot 6;"
alias best6 "bind q slot6; best;"

alias slot7 "bind q best7; slot 7;"
alias best7 "bind q slot7; best;"

alias slot8 "bind q best8; slot 8;"
alias best8 "bind q slot8; best;"

alias slot9 "bind q best9; slot 9;"
alias best9 "bind q slot9; best;"

alias slot0 "bind q best0; slot 0;"
alias best0 "bind q slot0; best;"

bind 1 slot1
bind 2 slot2
bind 3 slot3
bind 4 slot4
bind 5 slot5
bind 6 slot6
bind 7 slot7
bind 8 slot8
bind 9 slot9
bind 0 slot0

bind T slot3 # shotgun
bind Y slot3 #
bind F slot8 # railgun
bind G slot4 # nailgun
bind Z slot7 # lightning
bind X slot6 # rocket
bind C slot2 # machinegun
bind V slot5 # tribolt
bind B slot9 # bfg

fov 120
switchonpickup 0
cl_noammoswitch false
